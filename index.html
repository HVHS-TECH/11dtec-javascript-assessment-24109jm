<!DOCTYPE html>
    <html>
        <head>
            <title>The Origins Café</title>
            <link rel="stylesheet" href="style.css">
            <script src="script.js" defer></script>
        </head>
        <body>
            <div class="nav">
                <img src="Logo.png">
            </div>
            <div class="main">
                <div class="item">
                    <img src="nlm.png">
                    <h2>
                        Natural Lime Milkshake
                    </h2>
                    <p>
                        A lime milkshake made with real, natural lime.
                    </p>
                </div>
                <div class="item">
                    <img src="zb.png">
                    <h2>
                        Zero Burger
                    </h2>
                    <p>
                        A zero-meat burger with a side of fries.
                    </p>
                </div>
                <div class="item">
                    <img src="of.png">
                    <h2>
                        Only Fries
                    </h2>
                    <p>
                        Nothing more than fries.
                    </p>
                </div>
                <div class="item">
                    <img src="rlb.png">
                    <h2>
                        Real Life Brownie
                    </h2>
                    <p>
                        Not a fake brownie, a real life one!
                    </p>
                </div>
            </div>
            <div class="order">
                <h2>
                    Order
                </h2>
                <div class="orderField">
                    <div class="quantitySelector">
                        <p>
                            Natural Lime Milkshake
                        </p>
                        <button id="NLMminus">
                            -
                        </button>
                        <input id="NLMquant" type="number" value="0" min="0">
                        <button id="NLMplus">
                            +
                        </button>
                    </div>
                    <div class="quantitySelector">
                        <p>
                            Zero Burger
                        </p>
                        <button id="ZBminus">
                            -
                        </button>
                        <input id="ZBquant" type="number" value="0" min="0">
                        <button id="ZBplus">
                            +
                        </button>
                    </div>
                    <div class="quantitySelector">
                        <p>
                            Only Fries
                        </p>
                        <button id="OFminus">
                            -
                        </button>
                        <input id="OFquant" type="number" value="0" min="0">
                        <button id="OFplus">
                            +
                        </button>
                    </div>
                    <div class="quantitySelector">
                        <p>
                            Real Life Brownie
                        </p>
                        <button id="RLBminus">
                            -
                        </button>
                        <input id="RLBquant" type="number" value="0" min="0">
                        <button id="RLBplus">
                            +
                        </button>
                    </div>
                </div>
            </div>
        </body>
    </html>
